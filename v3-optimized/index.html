<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Optimized Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="main-header">
            <div class="header-text">
                <h1>🔒 Enterprise Data Command</h1>
                <p class="subtitle">Fault-Tolerant Processing, Request Throttling & Session Caching</p>
            </div>
            <div class="theme-switch-wrapper">
                <span class="theme-label">Mode</span>
                <label class="theme-switch" for="theme-checkbox">
                    <input type="checkbox" id="theme-checkbox">
                    <div class="slider round"></div>
                </label>
            </div>
        </header>

        <section class="control-panel">
            <div class="sync-wrapper">
                <button id="fetch-btn">Sync Global Cache</button>
                <span id="cache-status" class="cache-badge">No Active Cache</span>
            </div>
            
            <div class="filter-group">
                <input type="text" id="search-input" placeholder="Search parameters (debounced)..." disabled>
                <select id="source-filter" disabled>
                    <option value="all">All News Sources</option>
                </select>
            </div>

            <div class="toggle-group">
                <button id="toggle-list-btn" class="view-toggle active">List View</button>
                <button id="toggle-chart-btn" class="view-toggle">Analytics View</button>
            </div>
        </section>

        <main class="dashboard-grid">
            <div id="error-boundary" class="error-card hidden">
                <div class="error-icon">⚠️</div>
                <h3 id="error-title">Network Exception Intercepted</h3>
                <p id="error-message">Telemetry system failed to parse server packets safely.</p>
                <button id="retry-btn">Force Clear & Retry Sync</button>
            </div>

            <div id="skeleton-loader" class="news-flex hidden">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <section id="list-view" class="view-section">
                <div id="news-container" class="news-flex"></div>
            </section>

            <section id="chart-view" class="view-section hidden">
                <div class="chart-container">
                    <canvas id="metricsChart"></canvas>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
